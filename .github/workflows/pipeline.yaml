name: "Hello Github Actions"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    
  workflow_dispatch:
    
jobs:
  hello-job:
    name: "Demonstrar Estrutura Basica"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Executar hello world
        run: echo "Hello, Github Actions!"

      - name: Mostrar Informacoes do Sistema
        run: |
          echo " Sistema Operacional ${{runner.os}} "
          echo " Diretorio atual $(pwd) "
          echo " Data atual $(date) "
          echo " Usuario $(whoami) "
        
     - name: Listar arquivos do repositorio
       run: ls -la
       
     - name: Comandos multiplos
       run: |
         echo "Primeiro comando"
         echo "Segundo comando"
         echo "Terceiro comando"