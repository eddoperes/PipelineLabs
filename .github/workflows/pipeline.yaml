name: "Demonstracao de Variaveis de Ambiente"

on: 
  push: 
    branches: 
      - main 
  workflow_dispatch: 

# Variaveis de ambiente no nivel de WORKFLOW 
env: 
  WORKFLOW_VAR: "Variavel definido no nivel do workflow" 
  AMBIENTE: "producao" 
  VERSAO_APP: "1.0.0" 

jobs: 
  demonstracao-variaveis: 
    runs-on: ubuntu-latest 
 
    # variaveis de onbiente no nivel do JOB 
    env: 
      JOB_VAR: "Variant definido no nivel do job" 
      USUARIO: "devops-user" 

    steps: 
      - name: Exibir variaveis do workflow 
        run: | 
          echo "=== Variaveis do Workflow ==" 
          echo "Variavel WORKFLOW_VAR: $(( env.WORKFLOW_VAR }}"
          echo "Anbiente: ${{ env.AMBIENTE }}"
          echo "Verso° do oplicocao: ${{ env.VERSAO_APP }}" 

      - name: Exibir variaveis do job 
        run: | 
          echo = "Variaveis do Job ===" 
          echo "Variavel JOB_VAR: ${{ env.JOB_VAR }}" 
          echo "Usuario: $(( env.USUARIO }}" 

      - name: Exibir variant do step 
        env: 
          STEP_VAR: "VariSvel definida no nivel do step" 
          MENSAGEM: "Este é um exenplo protico!" 
        run: | 
          echo "=== Variaveis do Step = "
          echo "VarOvel STEP_VAR: ${{ env.STEP_VAR }}" 
          echo "Mensagem: ${( env.MENSAGEM )}" 

      - name: Conbinar variaveis de diferentes ntveis 
        env: 
          STEP_ESPECIFICO: "step-value" 
        run: | 
          echo " Combinacao de variaveis "
          echo "Workflow: ${{ env.WORKFLOW_VAR }}" 
          echo "Job: ${{ env.JOB_VAR }}" 
          echo "Step: ${{ env.STEP_ESPECIFICO }}" 
          echo "Todos acessiveis no nem contextor" 

      - name: Usar variaveis en conandos prolicoS 
        env: 
          NOME_PROJETO: "lab-variaveis" 
          TIMESTAMP: "2025-01-13" 
        run: | 
          echo "=== Exemplo Prático ===" 
          echo "Compilando projeto: ${{ env.NOME_PROJETO }}" 
          echo "Data de build: ${{ env.TIMESTAMP }}" 
          echo "Ambiente de deploy: ${{ env.AMBIENTE }}" 
          echo "Versão: ${{ env.VERSAO_APP }}" 