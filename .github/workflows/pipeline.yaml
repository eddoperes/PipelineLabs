name: Demo GitHub Secrets 

on: 
  push: 
    branches: 
      - main 
  workflow_dispatch: 

jobs: 
  demonstrar-secrets: 
    runs-on: ubuntu-latest 

    steps: 
    # Step 1: Checkout de codigo 
    - name: Fozer checkout do repositorio 
      uses: actions/checkout@v4

    # Step 2: Denonstrar use de secrets en vorieveis de anbiente 
    - name: Configurar credenclais da API 
      env: 
        API KEY: ${{ secrets.API_KEY }} 
        API_URL: ${{ secrets.API_URL }}
      run: | 
        echo "Configurando conexAo con API externa..." 
        echo "URL da API: $API_URL" 
        echo "API Key esta configurada: ${API_KEY+SIN}" 

    # Step 3: Sinutar ccnexAo con banco de d5d05 usando secrets 
    - name: Conectar ao banco de dados 
      env: 
        DB_HOST: ${{ secrets.DB_HOST }} 
        DB_USERNAME: ${{ secrets.DB_USERNAME }} 
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }} 
        DB_PORT: ${{ secrets.DB_PORT }} 
      run: | 
        echo "Configurando conexao con banco de dodos...- 
        echo "Host: $DB_HOST" 
        echo "Porte: $DB_PORT" 
        echo "Usuirio: $DB_USERNAME" 
        echo "Senha: $DB_PASSWORD" 
        echo "Observe que a senha sera mascarada nos logs!' 
 
    # Step a: User secret en un token de deploy 
    - name: Preparar deploy con token 
      env: 
        DEPLOY_TOKEN:${{ secrets.DEPLOY_TOKEN }}
      run: | 
        echo "Preparando deploy..." 
        echo "Token de deploy: $DEPLOY_TOKEN" 
        echo "GitHub automaticonente nascara o valor real do token!" 

