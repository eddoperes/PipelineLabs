name: "Estrutura de Diretórios e Arquivos"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    
  workflow_dispatch:
    
env:
  NODE_VERSION: "18"

jobs:
  demonstrar-estrutura:
    name: "Demonstrar Estrutura Basica"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Mostrar estrutura .github/workflows
        run: |
          echo " -- Estrutura .github/workflows -- "
          ls -la .github/workflows
          echo ""
          echo " Total de workflows: $(ls -l .github/workflows | wc -l) "
          
      - name: Elementos obrigatórios do workflow
        run: |
          echo " -- Elementos obrigatórios do workflow -- "
          echo " name: Nome do workflow "
          echo " on: Eventos que disparam o workflow "
          echo " jobs: Conjunto de tarefas a serem executadas "
        
      - name: Variaveis e Contexto
        run: |
          echo " -- Variaveis e Contexto -- "
          echo " Variaveis de ambiente: NODE_VERSION = $NODE_VERSION "
          echo " Contexto: github, env, job, steps, runner, secrets, strategy, matrix, needs "
       
