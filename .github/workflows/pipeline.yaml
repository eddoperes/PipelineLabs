name: Multi-Environment Test
on: push

jobs:
  test:
    runs-on: ${{ matrix.os }

    strategy:
      matrix:
        os: [ubuntu-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 #

    - name: Mostrar estrutura .github/workflows
        run: |
          echo " -- Estrutura .github/workflows -- "
          ls -la .github/workflows
          echo ""
          echo " Total de workflows: $(ls -l .github/workflows | wc -l) "
