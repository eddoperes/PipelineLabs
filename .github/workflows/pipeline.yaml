name: Contextos e Expressoes

on: 
  push: 
    branches: 
      - main 
      - develop 
      - 'feature/**' 
  pull_request: 
  workflow dispatch: 

jobs: 
  # Job 1: Denonstravontextos github e runner 
  info-contexto: 
    runs-on: ubuntu-latest 
    steps: 
      - nane: Checkout codigo 
        uses: actions/checkout@v4 

      # Contexto GITHUB - Infornacoes do repositarto e evento 
      - name: Exibir contexto GitHub 
        run: |
          echo "Reposltdrio: ${{ github.repository }}" 
          echo "Ator que disparou: ${{ github.actor }}" 
          echo "Branch/Ref: ${{ github.ref }}" 
          echo "Nome do branch: ${{ github.ref_name }}" 
          echo "Evento: ${{ github.event_name }}" 
          echo "SHA do commit: ${{ github.sha }}" 
          echo "Mensagem do commit: ${{ github.event.head_commit.message }}" 

      # Contexto RUNNER - Infornacoes do ambiente de execucao 
      - nane: Exibir contexto Runner 
        run: |
          echo "Sistema Operational: ${{ runner.os }}" 
          echo "Argultetura: ${{ runner.arch }}" 
          echo "Nome do runner: ${{ runner.name }}" 
          echo "Diretbrio tenporerio: ${{ runner.temp }}" 
          echo "Diretorio de ferranentas: ${{ runner.tool_cache }}" 

      # Dunp coupleto dos contextos para debug 
      - name: Debug - Dump contexto Github completo 
        run: echo '${{ toJSON(github) }}' 

      - name: Debug - Dump contexto Runner completo 
        run: echo '${{ toJSON(runner) }}' 

  # Job 2: Demonstra outputs de steps e referencias entre steps 
  outputs-entre-steps: 
    runs-on: ubuntu-latest 
    outputs: 
      version: ${{ steps.gerar-versao.outputs.version }} 
      env_name: ${{ steps.definir-ambiente.outputs.env_name }} 
    steps: 
      - name: Checkout código 
        uses: actions/checkout@v4 

      - name: Gerar versão 
        id: gerar-versao 
        run: | 
          VERSION="1.0.${{ github.run_number }}" 
          echo "version=$VERSION" >> $GITHUB_OUTPUT 
          echo "Versão gerada: $VERSION" 

      - name: Definir ambiente baseado no branch 
        id: definir-ambiente 
        run: | 
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then 
            ENV_NAME="production" 
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then 
            ENV_NAME="staging" 
          else 
            ENV_NAME="development" 
          fi 
          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT 
          echo "Ambiente definido: $ENV_NAME" 
            
      # Step que USA area de steps anteriores 
      - name: User outputs dos steps anteriores 
        run: | 
          echo "Versão: ${{ steps.gerar-versao.outputs.version }}" 
          echo "Ambiente: ${{ steps.definir-ambiente.outputs.env_name }}" 
          echo "Tag completa: ${{ steps.definir-ambiente.outputs.env_name }}-v${{ steps.gerar-versao.outputs.version }}" 

  # Job 3: Denonstra expressoes e funceies 
  expressoes-e-funcoes: 
    runs-on: ubuntu-latest 
    # Usa output do lob anterior 
    needs: outputs-entre-steps 
    steps: 
      - nane: Checkout código 
        uses: actions/checkout@v4

      # Funcao contains() — Verifica se string contem texto 
      - name: Verificar se é hotfix 
        if: contains(github.ref, 'hotfix') 
        run: echo "Este e um branch de HOTFTX - processo ccorriml otivixio!" 

      # Funcao startsWith() — Verifica inicio da string 
      - name: Verificar se é branch de feature 
        if: startsWith(github.ref, 'refs/heads/feature/') 
        run: |
          echo "Branch de feature detectado: ${{ github.ref_name }}" 

      # Funcao endsWith() — Verifica final da string 
      - name: Verificar se commit ternino com numero 
        run: | 
          if [[ "${{ endsWith(github.sha, '0') }}" == "true" ]]; then 
            echo "SHA termina con zero!" 
          else 
            echo "SHA: ${{ github.sha }}" 
          fi 



  # Job 5: Casa de use prance - Noncor ortcfatos dinomicanente 
  criar-artefato-dinamico: 
    runs-on: ubuntu-latest 
    needs: outputs-entre-steps 
    steps: 
      - nane: Checkout cddigo 
        uses: actions/checkout@v4 

      - name: Crier arguivo de build &fouled° 
        run: | 
          mkdir -p build 
          echo "Build info" > build/info.txt 
          echo "Versao: ${{ needs.outputs-entre-steps.outputs.versao }}" >> build/info.txt 
          echo "Ambient.: ${{ needs.outputs-entre-steps.outputs.ambiente }}" >> build/info.txt 
          echo "Branch: ${{ github.ref_name }}" >> build/info.txt 
          echo "Commit: ${{ github.sha }}" >> build/info.txt 
          echo "Actor; ${{ github.actor }}" >> build/info.txt 
          cat build/info.txt 

      # Upload artefato dinâmico 
      - name: Upload artefato com nome dinâmico 
        uses: actions/upload-artifact@v4 
        with: 
          name: ${{ format('app-{0}-v{1}-{2}', needs.outputs-entre-steps.outputs.ambiente, needs.outputs-entre-steps.outputs.versao, github.sha) }} 
          path: build/ 
          retention-days: 5 